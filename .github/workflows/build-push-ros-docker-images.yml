name: Build and Push ROS Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-ubuntu-base:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
        os_version: [noble, jammy]

    runs-on: 'ubuntu-latest'
    name: Build base image ubuntu:${{ matrix.os_version }} (${{ matrix.arch }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define Docker image metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/ros2-ubuntu
          tags: type=raw,value=${{ matrix.os_version }}-${{ matrix.arch }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/base/Dockerfile.ubuntu
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE_VERSION=${{ matrix.os_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-rhel-base:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
        os_version: [8, 9]

    runs-on: 'ubuntu-latest'
    name: Build base image rhel:${{ matrix.os_version }} (${{ matrix.arch }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define Docker image metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/ros2-rhel
          tags: type=raw,value=${{ matrix.os_version }}-${{ matrix.arch }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/base/Dockerfile.rhel
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE_VERSION=${{ matrix.os_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


