name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            os_version: noble
            ros2_version: rolling
            type: pkg
            arch: amd64
            runner: ubuntu-latest
