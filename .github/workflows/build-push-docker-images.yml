name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            os_version: noble
            ros2_version: kilted
            type: pkg
            arch: amd64
            runner: ubuntu-latest
          # - os: ubuntu
          #   os_version: jammy
          #   ros2_version: humble
          #   arch: amd64
          #   runner: ubuntu-latest
          # - os: ubuntu
          #   os_version: jammy
          #   ros2_version: iron
          #   arch: amd64
          #   runner: ubuntu-latest
          # - os: ubuntu
          #   os_version: jammy
          #   ros2_version: humble
          #   arch: arm64
          #   runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.os }}/${{ matrix.os_version }} | ROS2-${{ matrix.ros2_version }} (${{ matrix.arch }})

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6.0.2

      - name: Configurar QEMU para compilaciones multi-arquitectura
        uses: docker/setup-qemu-action@v4.0.0

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Definir metadatos de la imagen Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}/ROS2-${{ matrix.type }}-${{ matrix.os }}
          tags: type=raw,value=${{ matrix.os_version }}-${{ matrix.ros2_version }}-${{ matrix.arch }}

      - name: Construir y publicar la imagen Docker
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/${{ matrix.type }}/Dockerfile.${{ matrix.os }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE_VERSION=${{ matrix.os_version }}
            ROS2_VERSION=${{ matrix.ros2_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max