name: Build and Push Buildfarm Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-buildfarm:
    strategy:
      fail-fast: false

    runs-on: 'ubuntu-latest'
    name: Build buildfarm image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define Docker image metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/ros2-buildfarm

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/buildfarm/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max